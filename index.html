<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AutoMind Agency — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #070a10;
    --card: #0d1120;
    --border: #181f35;
    --accent: #00ff88;
    --blue: #4f8eff;
    --text: #e8edf8;
    --muted: #4a5570;
    --user-bg: #1a2540;
    --bot-bg: #0d1120;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }
  body { font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; }

  /* HEADER */
  .chat-header {
    padding: 16px;
    background: var(--card);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 12px;
    flex-shrink: 0;
  }
  .bot-avatar {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #4f8eff);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .bot-info { flex: 1; }
  .bot-name { font-family: 'Space Mono', monospace; font-size: 14px; font-weight: 700; }
  .bot-status { font-size: 11px; color: var(--accent); display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .powered { font-size: 10px; color: var(--muted); font-family: 'Space Mono', monospace; }

  /* MESSAGES */
  .messages {
    flex: 1; overflow-y: auto; padding: 16px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .msg { display: flex; gap: 10px; align-items: flex-end; max-width: 88%; }
  .msg.bot { align-self: flex-start; }
  .msg.user { align-self: flex-end; flex-direction: row-reverse; }

  .msg-avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #00ff88, #4f8eff);
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; flex-shrink: 0;
  }
  .msg-avatar.user-av {
    background: linear-gradient(135deg, #4f8eff, #7b5cff);
  }

  .msg-bubble {
    padding: 12px 16px;
    border-radius: 18px;
    font-size: 14px;
    line-height: 1.6;
    max-width: 100%;
    word-break: break-word;
  }
  .msg.bot .msg-bubble {
    background: var(--bot-bg);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }
  .msg.user .msg-bubble {
    background: var(--user-bg);
    border: 1px solid rgba(79,142,255,0.2);
    border-bottom-right-radius: 4px;
    color: #c8d8ff;
  }

  /* TYPING */
  .typing { display: flex; gap: 4px; align-items: center; padding: 14px 16px; }
  .typing span {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--muted); animation: bounce 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-8px)} }

  /* QUICK REPLIES */
  .quick-replies {
    padding: 10px 16px;
    display: flex; gap: 8px; flex-wrap: wrap;
    flex-shrink: 0;
  }
  .qr-btn {
    padding: 9px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 13px;
    font-family: 'Outfit', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .qr-btn:active { border-color: var(--accent); color: var(--accent); transform: scale(0.96); }
  .qr-btn.selected { border-color: var(--accent); color: var(--accent); background: rgba(0,255,136,0.08); }

  /* INPUT */
  .input-area {
    padding: 12px 16px;
    background: var(--card);
    border-top: 1px solid var(--border);
    display: flex; gap: 10px; align-items: flex-end;
    flex-shrink: 0;
  }
  .msg-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 12px 18px;
    font-family: 'Outfit', sans-serif;
    font-size: 14px;
    color: var(--text);
    outline: none;
    resize: none;
    max-height: 100px;
    line-height: 1.4;
    transition: border-color 0.2s;
  }
  .msg-input:focus { border-color: var(--accent); }
  .msg-input::placeholder { color: var(--muted); }
  .send-btn {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--accent);
    border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; flex-shrink: 0;
    transition: all 0.2s;
  }
  .send-btn:active { transform: scale(0.92); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

  /* SUMMARY CARD */
  .summary-card {
    background: rgba(0,255,136,0.04);
    border: 1px solid rgba(0,255,136,0.15);
    border-radius: 14px;
    padding: 14px;
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.7;
  }
  .summary-title {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .summary-row { display: flex; gap: 8px; margin-bottom: 4px; }
  .summary-label { color: var(--muted); font-size: 12px; min-width: 80px; }
  .summary-val { color: var(--text); font-size: 12px; font-weight: 600; }

  /* SETUP PANEL */
  .setup-panel {
    position: fixed; inset: 0;
    background: var(--bg);
    z-index: 100;
    display: flex; flex-direction: column;
    padding: 24px 16px;
    overflow-y: auto;
  }
  .setup-panel.hidden { display: none; }
  .setup-title { font-family: 'Space Mono', monospace; font-size: 18px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .setup-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
  .setup-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; font-family: 'Space Mono', monospace; }
  .setup-input {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 13px 16px;
    font-family: 'Space Mono', monospace; font-size: 12px;
    color: var(--text); outline: none; margin-bottom: 14px;
    transition: border-color 0.2s;
  }
  .setup-input:focus { border-color: var(--accent); }
  .setup-input::placeholder { color: var(--muted); }
  .setup-btn {
    width: 100%; padding: 16px;
    background: var(--accent); color: #070a10;
    border: none; border-radius: 12px;
    font-family: 'Outfit', sans-serif; font-size: 15px; font-weight: 700;
    cursor: pointer; margin-top: 8px;
  }
  .setup-btn:active { opacity: 0.85; }
  .setup-note { font-size: 11px; color: var(--muted); text-align: center; margin-top: 12px; line-height: 1.6; }
</style>
</head>
<body>

<!-- SETUP PANEL -->
<div class="setup-panel" id="setupPanel">
  <div class="setup-title">⚙️ Agency Setup</div>
  <div class="setup-sub">Ek baar setup karo — hamesha ke liye save rahega!</div>

  <div class="setup-label">Groq API Key</div>
  <input type="password" class="setup-input" id="s_groqKey" placeholder="gsk_xxxxxxxxxxxxxxxx">

  <div class="setup-label">Tera Naam</div>
  <input type="text" class="setup-input" id="s_ownerName" placeholder="Mahi" value="Mahi">

  <div class="setup-label">Agency Naam</div>
  <input type="text" class="setup-input" id="s_agencyName" placeholder="AutoMind Agency" value="AutoMind Agency">

  <div class="setup-label">Tera WhatsApp Number (with country code)</div>
  <input type="text" class="setup-input" id="s_whatsapp" placeholder="+91XXXXXXXXXX">

  <div class="setup-label">Teri Email (jahan client info aaye)</div>
  <input type="email" class="setup-input" id="s_email" placeholder="your@gmail.com">

  <button class="setup-btn" onclick="saveSetup()">✅ Setup Save Karo & Chatbot Shuru Karo</button>
  <div class="setup-note">🔒 Sab info sirf is device pe save hogi — kahi nahi jayegi</div>
</div>

<!-- CHAT UI -->
<div class="chat-header">
  <div class="bot-avatar">🤖</div>
  <div class="bot-info">
    <div class="bot-name" id="headerName">AutoMind Agency</div>
    <div class="bot-status"><div class="status-dot"></div> Online — Ready to Help</div>
  </div>
  <div class="powered">AI Agent</div>
</div>

<div class="messages" id="messages"></div>
<div class="quick-replies" id="quickReplies"></div>

<div class="input-area">
  <textarea class="msg-input" id="msgInput" placeholder="Type your message..." rows="1" onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
</div>

<script>
// ─── CONFIG ───
let config = {
  groqKey: '',
  ownerName: 'Mahi',
  agencyName: 'AutoMind Agency',
  whatsapp: '',
  email: ''
};

// Conversation state
let state = {
  step: 'greeting',
  clientData: {
    name: '', email: '', business: '', need: '',
    platform: '', features: '', budget: '', timeline: '', extra: ''
  }
};

let isTyping = false;

// ─── SETUP ───
window.onload = () => {
  const saved = localStorage.getItem('am_config');
  if (saved) {
    config = JSON.parse(saved);
    document.getElementById('setupPanel').classList.add('hidden');
    document.getElementById('headerName').textContent = config.agencyName;
    startChat();
  } else {
    document.getElementById('setupPanel').classList.remove('hidden');
  }
};

function saveSetup() {
  const key = document.getElementById('s_groqKey').value.trim();
  const owner = document.getElementById('s_ownerName').value.trim();
  const agency = document.getElementById('s_agencyName').value.trim();
  const wa = document.getElementById('s_whatsapp').value.trim();
  const em = document.getElementById('s_email').value.trim();

  if (!key.startsWith('gsk_')) { alert('Valid Groq API key dalo!'); return; }
  if (!owner || !agency) { alert('Naam aur agency naam dalo!'); return; }

  config = { groqKey: key, ownerName: owner, agencyName: agency, whatsapp: wa, email: em };
  localStorage.setItem('am_config', JSON.stringify(config));
  document.getElementById('setupPanel').classList.add('hidden');
  document.getElementById('headerName').textContent = agency;
  startChat();
}

// ─── CHAT ───
function startChat() {
  setTimeout(() => {
    botMessage(`👋 Hey! Welcome to **${config.agencyName}**!\n\nI'm your AI assistant. I'll help you figure out exactly what you need and get you connected with ${config.ownerName}.\n\nFirst, what's your name? 😊`);
    state.step = 'get_name';
  }, 500);
}

function botMessage(text, showQuickReplies = []) {
  return new Promise(resolve => {
    showTyping();
    const delay = Math.min(500 + text.length * 8, 2000);

    setTimeout(() => {
      hideTyping();
      appendMessage('bot', formatText(text));
      if (showQuickReplies.length) setQuickReplies(showQuickReplies);
      else clearQuickReplies();
      resolve();
    }, delay);
  });
}

function formatText(text) {
  return text
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function appendMessage(role, html) {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;

  const avatar = document.createElement('div');
  avatar.className = role === 'bot' ? 'msg-avatar' : 'msg-avatar user-av';
  avatar.textContent = role === 'bot' ? '🤖' : '👤';

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = html;

  wrap.appendChild(avatar);
  wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function showTyping() {
  const msgs = document.getElementById('messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg bot'; wrap.id = 'typingMsg';
  const avatar = document.createElement('div');
  avatar.className = 'msg-avatar'; avatar.textContent = '🤖';
  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  wrap.appendChild(avatar); wrap.appendChild(bubble);
  msgs.appendChild(wrap);
  msgs.scrollTop = msgs.scrollHeight;
}

function hideTyping() {
  const t = document.getElementById('typingMsg');
  if (t) t.remove();
}

function setQuickReplies(options) {
  const qr = document.getElementById('quickReplies');
  qr.innerHTML = '';
  options.forEach(opt => {
    const btn = document.createElement('button');
    btn.className = 'qr-btn';
    btn.textContent = opt;
    btn.onclick = () => {
      clearQuickReplies();
      userSays(opt);
      processInput(opt);
    };
    qr.appendChild(btn);
  });
}

function clearQuickReplies() {
  document.getElementById('quickReplies').innerHTML = '';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || isTyping) return;
  input.value = ''; input.style.height = 'auto';
  clearQuickReplies();
  userSays(text);
  processInput(text);
}

function userSays(text) {
  appendMessage('user', text);
}

// ─── CONVERSATION FLOW ───
async function processInput(text) {
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  const t = text.toLowerCase().trim();

  switch(state.step) {
    case 'get_name':
      state.clientData.name = text;
      await botMessage(`Nice to meet you, **${text}**! 🙌\n\nWhat's your email address? (So ${config.ownerName} can follow up with you)`);
      state.step = 'get_email';
      break;

    case 'get_email':
      if (!text.includes('@')) {
        await botMessage(`Hmm, that doesn't look like a valid email 🤔\nCan you double-check it?`);
        break;
      }
      state.clientData.email = text;
      await botMessage(`Perfect! ✅\n\nNow tell me — **what's your business about?**\n(e.g. "I sell pet products online" or "I have a fashion brand")`, []);
      state.step = 'get_business';
      break;

    case 'get_business':
      state.clientData.business = text;
      await botMessage(`Got it! 👍\n\n**What do you need help with?**`, [
        '🌐 Website / Redesign',
        '📱 Mobile App',
        '🤖 AI Chatbot',
        '🛒 Sales Automation',
        '🎬 UGC Ads',
        '🚀 Full AI System'
      ]);
      state.step = 'get_need';
      break;

    case 'get_need':
      state.clientData.need = text;
      await botMessage(`Great choice! 🎯\n\nWhich platform are you looking at?`, getPlatformOptions(text));
      state.step = 'get_platform';
      break;

    case 'get_platform':
      state.clientData.platform = text;
      await botMessage(`Awesome! What are the **key features** you need?\n\n(Tell me in your own words — e.g. "user login, payment, product listing, admin panel")`);
      state.step = 'get_features';
      break;

    case 'get_features':
      state.clientData.features = text;
      await botMessage(`Got it! 💰\n\n**What's your budget range?**`, [
        '💵 Under $500',
        '💰 $500 - $1000',
        '💎 $1000 - $3000',
        '🚀 $3000+',
        '🤔 Not sure yet'
      ]);
      state.step = 'get_budget';
      break;

    case 'get_budget':
      state.clientData.budget = text;
      await botMessage(`Almost done! ⏰\n\n**When do you need this by?**`, [
        '🔥 ASAP (1-2 weeks)',
        '📅 1 Month',
        '🗓️ 2-3 Months',
        '😌 No rush'
      ]);
      state.step = 'get_timeline';
      break;

    case 'get_timeline':
      state.clientData.timeline = text;
      await botMessage(`Last question! 🙏\n\nAnything else you'd like ${config.ownerName} to know before the call?`);
      state.step = 'get_extra';
      break;

    case 'get_extra':
      state.clientData.extra = text;
      await botMessage(`Perfect! Let me prepare your summary... ✨`);
      await generateSummary();
      break;

    case 'done':
      await handlePostSummary(text);
      break;

    default:
      await handleFreeChat(text);
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
}

function getPlatformOptions(need) {
  const n = need.toLowerCase();
  if (n.includes('website') || n.includes('redesign')) return ['💻 New Website', '🔄 Redesign Existing', '🛒 E-commerce Store', '📰 Landing Page'];
  if (n.includes('app') || n.includes('mobile')) return ['📱 iOS App', '🤖 Android App', '📱 Both iOS & Android', '💻 Web App'];
  if (n.includes('chatbot')) return ['🌐 Website Chatbot', '💬 WhatsApp Bot', '📸 Instagram Bot', '🤝 All Platforms'];
  if (n.includes('automation')) return ['📧 Email Automation', '🛒 Sales Funnel', '📊 Full CRM Setup', '🔄 All-in-one'];
  return ['🌐 Web', '📱 Mobile', '💬 WhatsApp', '🔄 Multiple'];
}

async function generateSummary() {
  const d = state.clientData;

  // Generate AI summary + price estimate
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${config.groqKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{
          role: 'system',
          content: 'You are a project estimator for a digital agency. Based on client requirements, provide a brief project summary and price estimate in USD. Be concise and professional. Reply in JSON only.'
        }, {
          role: 'user',
          content: `Client needs:
- Business: ${d.business}
- Need: ${d.need}
- Platform: ${d.platform}
- Features: ${d.features}
- Budget: ${d.budget}
- Timeline: ${d.timeline}

Return JSON:
{
  "summary": "2-3 line project summary",
  "estimated_price": "price range in USD",
  "estimated_time": "realistic timeline",
  "recommendation": "one key recommendation for this client"
}`
        }],
        temperature: 0.7,
        max_tokens: 400
      })
    });

    const data = await response.json();
    const raw = data.choices[0].message.content;
    const match = raw.match(/\{[\s\S]*\}/);
    const ai = JSON.parse(match[0]);

    // Show summary card
    const msgs = document.getElementById('messages');
    const wrap = document.createElement('div');
    wrap.className = 'msg bot';
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar'; avatar.textContent = '🤖';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = `
      Here's your project summary! 📋
      <div class="summary-card">
        <div class="summary-title">📊 Project Brief</div>
        <div class="summary-row"><span class="summary-label">👤 Client</span><span class="summary-val">${d.name}</span></div>
        <div class="summary-row"><span class="summary-label">📧 Email</span><span class="summary-val">${d.email}</span></div>
        <div class="summary-row"><span class="summary-label">🏢 Business</span><span class="summary-val">${d.business}</span></div>
        <div class="summary-row"><span class="summary-label">🎯 Need</span><span class="summary-val">${d.need}</span></div>
        <div class="summary-row"><span class="summary-label">📱 Platform</span><span class="summary-val">${d.platform}</span></div>
        <div class="summary-row"><span class="summary-label">⚙️ Features</span><span class="summary-val">${d.features}</span></div>
        <div class="summary-row"><span class="summary-label">💰 Budget</span><span class="summary-val">${d.budget}</span></div>
        <div class="summary-row"><span class="summary-label">⏰ Timeline</span><span class="summary-val">${d.timeline}</span></div>
        <div class="summary-row"><span class="summary-label">💡 Estimate</span><span class="summary-val" style="color:#00ff88;">${ai.estimated_price}</span></div>
        <div class="summary-row"><span class="summary-label">🗓️ Est. Time</span><span class="summary-val">${ai.estimated_time}</span></div>
        <div style="margin-top:10px;padding:10px;background:rgba(79,142,255,0.06);border-radius:8px;font-size:12px;color:#99bbff;line-height:1.5;">
          <strong style="color:#4f8eff;">💡 Recommendation:</strong><br>${ai.recommendation}
        </div>
      </div>
    `;
    wrap.appendChild(avatar); wrap.appendChild(bubble);
    msgs.appendChild(wrap);
    msgs.scrollTop = msgs.scrollHeight;

    // Save lead data
    saveLead(d, ai);

    await sleep(1000);
    await botMessage(`**${config.ownerName}** will personally review your requirements and reach out within **24 hours**! 🚀\n\nWant to connect faster?`, [
      '💬 WhatsApp Karo',
      '📧 Email Bhejo',
      '✅ Theek Hai, Wait Karunga'
    ]);
    state.step = 'done';

  } catch(err) {
    // Fallback without AI
    await botMessage(`✅ **Requirements received!**\n\n${config.ownerName} will reach out to you at **${d.email}** within 24 hours!\n\nWant to connect faster?`, [
      '💬 WhatsApp Karo',
      '📧 Email Bhejo',
      '✅ Theek Hai'
    ]);
    state.step = 'done';
    saveLead(d, {});
  }
}

async function handlePostSummary(text) {
  const t = text.toLowerCase();
  if (t.includes('whatsapp') || t.includes('whats')) {
    if (config.whatsapp) {
      const msg = encodeURIComponent(`Hi ${config.ownerName}! I just filled the form on your website. My name is ${state.clientData.name} and I need help with ${state.clientData.need}. Can we connect?`);
      window.open(`https://wa.me/${config.whatsapp.replace(/[^0-9]/g,'')}?text=${msg}`, '_blank');
      await botMessage(`WhatsApp khul raha hai! 📱 Agar na khule toh manually message karo: **${config.whatsapp}**`);
    } else {
      await botMessage(`${config.ownerName} will reach out to you soon! 🙏`);
    }
  } else if (t.includes('email')) {
    if (config.email) {
      window.location.href = `mailto:${config.email}?subject=Project Inquiry from ${state.clientData.name}&body=Hi ${config.ownerName}, I need help with ${state.clientData.need}.`;
      await botMessage(`Email app khul raha hai! 📧`);
    }
  } else {
    await botMessage(`Perfect! 🙏 ${config.ownerName} will contact you at **${state.clientData.email}** soon!\n\nIs there anything else you'd like to know?`);
  }
}

async function handleFreeChat(text) {
  try {
    const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method: 'POST',
      headers: { 'Authorization': `Bearer ${config.groqKey}`, 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages: [{
          role: 'system',
          content: `You are a helpful AI assistant for ${config.agencyName}, run by ${config.ownerName}. You help clients understand our services (websites, mobile apps, AI chatbots, automation, UGC ads). Be friendly, concise, and professional. Always try to guide them toward booking a free consultation.`
        }, {
          role: 'user', content: text
        }],
        temperature: 0.8,
        max_tokens: 300
      })
    });
    const data = await response.json();
    const reply = data.choices[0].message.content;
    await botMessage(reply);
  } catch(e) {
    await botMessage(`Great question! ${config.ownerName} would be the best person to answer that. Shall I connect you? 😊`, ['💬 WhatsApp', '📧 Email', '✅ Okay']);
  }
}

function saveLead(clientData, aiData) {
  const leads = JSON.parse(localStorage.getItem('am_leads') || '[]');
  leads.unshift({
    ...clientData,
    ai_estimate: aiData.estimated_price || 'TBD',
    ai_timeline: aiData.estimated_time || 'TBD',
    timestamp: new Date().toLocaleString(),
    status: 'new'
  });
  localStorage.setItem('am_leads', JSON.stringify(leads));
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }
